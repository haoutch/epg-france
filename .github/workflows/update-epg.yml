name: Mettre à jour et publier l'EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "27 3 * * *"
  push:
    branches: ["main"]
    paths:
      - "scripts/**"
      - "config/**"
      - ".github/workflows/**"
      - "public/index.html"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer l'EPG
        run: python scripts/build_epg.py

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Envoyer les fichiers Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publier GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
